name: Deploy to GitHub Pages (DISABLED)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: false  # Temporarily disabled
    concurrency:
      group: pages
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Setup Git
        run: |
          git config --global user.name "Python1203"
          git config --global user.email "python1203@example.com"

      - name: Install dependencies
        run: |
          cd game-blog
          yarn install

      - name: Build project
        run: |
          cd game-blog
          export EXPORT=true
          yarn build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./game-blog/out
          publish_branch: gh-pages
          allow_empty_commit: false
          enable_jekyll: false