name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
      - id: configurepages
        uses: actions/configure-pages@v6
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Build with Next.js
        run: yarn build
        env:
          EXPORT: 'true'
          UNOPTIMIZED: 'true'
          BASE_PATH: ''
          NEXT_PUBLIC_BASE_PATH: ''
      - name: Verify build output
        run: |
          echo "=== Build Output Verification ==="
          echo "Total files in out directory:"
          find out -type f | wc -l
          echo "HTML files count:"
          find out -name "*.html" | wc -l
          echo "TXT files count:"
          find out -name "*.txt" | wc -l
          echo "Checking Chinese directories exist:"
          ls -d out/tags/%E* 2>/dev/null | wc -l || echo "No encoded dirs found"
          if [ -d "out/tags/%E6%95%B0%E7%A0%81%E7%94%B5%E5%AD%90%E4%BA%A7%E5%93%81%E5%A5%BD%E7%89%A9%E6%8E%A8%E8%8D%90" ]; then
            echo "Chinese dir contents:"
            ls "out/tags/%E6%95%B0%E7%A0%81%E7%94%B5%E5%AD%90%E4%BA%A7%E5%93%81%E5%A5%BD%E7%89%A9%E6%8E%A8%E8%8D%90/"
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
