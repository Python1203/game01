name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # 或者你的主分支名称

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          
      - name: Install dependencies
        run: yarn install
        
      - name: Build
        run: yarn build
        env:
          EXPORT: 'true'
          BASE_PATH: ''
          NEXT_PUBLIC_BASE_PATH: ''
          
      - name: Verify build output
        run: |
          echo "Checking out directory structure..."
          ls -la out/
          echo "Checking _next/static files..."
          find out/_next/static -type f | wc -l
          echo "Sample files:"
          find out/_next/static -type f | head -10
          echo "Checking tags directories..."
          find out/tags -name "index.txt" | wc -l
          echo "Chinese tag dirs:"
          find out/tags -type d -name "%E*" | wc -l
          
      - name: Copy CNAME
        run: cp CNAME out/
        
      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          static_site_generator: next
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './out'
          retention-days: 1

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
